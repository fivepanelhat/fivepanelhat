name: CI Scan
on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
concurrency:
  group: ci-scan-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  packages: read
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install lint tooling
        # flake8 was previously only installed when requirements-dev.txt was
        # absent, so repos WITH dev requirements failed with exit 127.
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
      - name: Lint (fatal errors - syntax and undefined names)
        # Style rules live in each repo's own lint config; this scheduled
        # scan gates only on errors that always indicate broken code.
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv,venv,node_modules,build,dist,data,out
      - name: Run tests
        shell: bash
        run: |
          if compgen -G "tests/test_*.py" > /dev/null; then
            if [ -f requirements.txt ]; then
              sudo apt-get update -qq && sudo apt-get install -y -qq portaudio19-dev || true
              pip install -r requirements.txt
            fi
            python -m pytest tests -q
          else
            echo "No pytest suite at tests/ - lint-only scan."
          fi
